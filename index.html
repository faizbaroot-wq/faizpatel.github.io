<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سبل السلام تعلیمی سینٹر – حاضری رجسٹر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1a7a4a;
  --green-light: #e8f5ee;
  --green-dark: #145c38;
  --red: #c0392b;
  --red-light: #fdecea;
  --yellow: #d4a017;
  --yellow-light: #fef9e7;
  --gold: #b8860b;
  --cream: #fdf8f0;
  --white: #ffffff;
  --gray-50: #f9f7f4;
  --gray-100: #f0ece4;
  --gray-200: #e0d9cc;
  --gray-300: #c8bfad;
  --gray-500: #7a6e5e;
  --gray-700: #4a4236;
  --gray-900: #2a2218;
  --border: #d4c9b5;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
  --font: 'Noto Nastaliq Urdu', serif;
  --radius: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: var(--font);
  background: var(--cream);
  color: var(--gray-900);
  min-height: 100vh;
  direction: rtl;
}
/* ===== NOTIFICATION BAR ===== */
#notifBar {
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  color: #fff;
  text-align: center;
  padding: 8px 20px;
  font-size: 0.95rem;
  display: none;
  position: relative;
}
#notifBar.active { display: block; }
#notifClose {
  position: absolute;
  left: 16px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: #fff; font-size: 1.2rem;
  cursor: pointer; line-height: 1;
}

/* ===== HEADER ===== */
header {
  background: linear-gradient(160deg, #1a4a2e 0%, #1e5c38 40%, #22703f 100%);
  color: #fff;
  padding: 16px 24px 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  position: relative;
}
.header-top {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.header-left { text-align: right; }
.header-center { text-align: center; }
.header-right { text-align: left; }
.bismillah {
  font-size: 1.05rem;
  color: #c8e6c9;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.school-name {
  font-size: 1.55rem;
  font-weight: 700;
  color: #fff;
  line-height: 1.5;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}
.school-sub {
  font-size: 0.85rem;
  color: #a5d6b0;
  margin-top: 2px;
}
.register-title {
  font-size: 1.05rem;
  color: #c8e6c9;
  margin-top: 6px;
}
/* Clock */
.clock-box {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  padding: 8px 14px;
  display: inline-block;
  min-width: 130px;
}
.clock-time {
  font-size: 1.4rem;
  font-weight: 600;
  color: #fff;
  letter-spacing: 1px;
  font-family: 'Courier New', monospace;
  display: block;
  text-align: center;
}
.clock-ampm {
  font-size: 0.75rem;
  color: #a5d6b0;
  font-family: var(--font);
  display: block;
  text-align: center;
  margin-top: 2px;
}
/* Month display */
.month-box {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  padding: 8px 14px;
  display: inline-block;
  text-align: center;
}
.month-name {
  font-size: 1.1rem;
  color: #fff;
  font-weight: 600;
}
.month-year {
  font-size: 0.75rem;
  color: #a5d6b0;
  margin-top: 2px;
}
/* Gold divider */
.header-divider {
  border: none;
  border-top: 1px solid rgba(200,180,100,0.4);
  margin: 8px 0 0;
}

/* ===== NAV BAR ===== */
nav {
  background: #fff;
  border-bottom: 2px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow);
  position: sticky;
  top: 0;
  z-index: 100;
}
.nav-links {
  display: flex;
  gap: 4px;
  list-style: none;
}
.nav-links li a, .nav-links li button {
  display: block;
  padding: 14px 16px;
  font-family: var(--font);
  font-size: 0.95rem;
  color: var(--gray-700);
  text-decoration: none;
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-links li a:hover, .nav-links li button:hover { color: var(--green); }
.nav-links li a.active, .nav-links li button.active {
  color: var(--green);
  border-bottom-color: var(--green);
  font-weight: 600;
}
.nav-right { display: flex; align-items: center; gap: 10px; }
#userInfo {
  font-size: 0.9rem;
  color: var(--gray-700);
  display: none;
}
#userInfo.active { display: flex; align-items: center; gap: 8px; }
.user-badge {
  background: var(--green-light);
  color: var(--green-dark);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.85rem;
}
.admin-badge {
  background: #fff3cd;
  color: #856404;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 0.78rem;
}
.btn-logout {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 12px;
  font-family: var(--font);
  font-size: 0.85rem;
  color: var(--red);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-logout:hover { background: var(--red-light); }

/* ===== PAGES ===== */
.page { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
.page.active { display: block; }

/* ===== AUTH FORMS ===== */
.auth-container {
  max-width: 480px;
  margin: 40px auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: var(--shadow-md);
  overflow: hidden;
}
.auth-header {
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  padding: 24px;
  text-align: center;
  color: #fff;
}
.auth-header h2 { font-size: 1.4rem; margin-bottom: 4px; }
.auth-header p { font-size: 0.85rem; color: #a5d6b0; }
.auth-body { padding: 28px; }
.form-group { margin-bottom: 18px; }
.form-group label {
  display: block;
  font-size: 0.9rem;
  color: var(--gray-700);
  margin-bottom: 6px;
  font-weight: 600;
}
.form-group input, .form-group select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 0.95rem;
  color: var(--gray-900);
  background: var(--gray-50);
  transition: border 0.2s;
  direction: rtl;
}
.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--green);
  background: #fff;
}
.form-group select[multiple] { height: 100px; }
.btn-primary {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  color: #fff;
  border: none;
  border-radius: 8px;
  font-family: var(--font);
  font-size: 1rem;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.9; }
.btn-secondary {
  width: 100%;
  padding: 10px;
  background: none;
  color: var(--green);
  border: 1px solid var(--green);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 0.9rem;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.2s;
}
.btn-secondary:hover { background: var(--green-light); }
.form-msg {
  margin-top: 12px;
  padding: 10px;
  border-radius: 8px;
  font-size: 0.9rem;
  text-align: center;
  display: none;
}
.form-msg.success { background: var(--green-light); color: var(--green-dark); display: block; }
.form-msg.error { background: var(--red-light); color: var(--red); display: block; }

/* ===== ATTENDANCE TABLE ===== */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 20px;
  box-shadow: var(--shadow);
}
.week-nav-btn {
  background: var(--green-light);
  color: var(--green-dark);
  border: 1px solid var(--green);
  border-radius: 8px;
  padding: 8px 18px;
  font-family: var(--font);
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.week-nav-btn:hover { background: var(--green); color: #fff; }
.week-nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.week-label {
  font-size: 1rem;
  color: var(--gray-700);
  font-weight: 600;
}
.week-label span {
  color: var(--green-dark);
  font-size: 0.9rem;
  margin-right: 8px;
}

.table-wrap {
  background: #fff;
  border-radius: 12px;
  box-shadow: var(--shadow);
  overflow-x: auto;
  border: 1px solid var(--border);
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 800px;
}
thead tr {
  background: linear-gradient(135deg, #1a4a2e, #1e5c38);
  color: #fff;
}
thead tr:first-child th {
  padding: 12px 8px 6px;
  font-size: 0.9rem;
  font-weight: 600;
}
thead tr:first-child th.day-col {
  text-align: center;
  font-size: 0.85rem;
}
.date-row th {
  background: #245c38;
  padding: 4px 8px 10px;
  font-size: 0.78rem;
  color: #a5d6b0;
  text-align: center;
  font-family: monospace;
  font-weight: normal;
  letter-spacing: 0.5px;
}
.date-row th.static-col { background: #1a4a2e; }
tbody tr {
  border-bottom: 1px solid var(--gray-100);
  transition: background 0.15s;
}
tbody tr:hover { background: var(--gray-50); }
tbody tr.empty-row { background: var(--gray-50); opacity: 0.5; }
td {
  padding: 10px 8px;
  font-size: 0.92rem;
  vertical-align: middle;
}
td.num-col {
  text-align: center;
  color: var(--gray-500);
  font-size: 0.85rem;
  width: 40px;
  min-width: 40px;
}
td.name-col {
  min-width: 140px;
  max-width: 160px;
  font-weight: 600;
  color: var(--gray-900);
}
td.branch-col {
  min-width: 100px;
  max-width: 120px;
  font-size: 0.82rem;
  color: var(--gray-500);
}
td.att-cell {
  text-align: center;
  width: 64px;
  min-width: 64px;
  padding: 6px 4px;
}
.att-btn {
  width: 44px;
  height: 36px;
  border-radius: 8px;
  border: 1.5px dashed var(--gray-300);
  background: var(--gray-50);
  cursor: pointer;
  font-size: 1.1rem;
  line-height: 1;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.att-btn:hover:not([disabled]) {
  border-color: var(--green);
  background: var(--green-light);
}
.att-btn.present {
  background: var(--green-light);
  border: 2px solid var(--green);
  color: var(--green);
  cursor: default;
}
.att-btn.absent {
  background: var(--red-light);
  border: 2px solid var(--red);
  color: var(--red);
  cursor: default;
}
.att-btn.late {
  background: var(--yellow-light);
  border: 2px solid var(--yellow);
  color: var(--yellow);
  cursor: default;
}
.att-btn.future {
  opacity: 0.35;
  cursor: not-allowed;
  border: 1.5px dashed var(--gray-200);
}
.att-btn.locked { opacity: 0.8; }
.today-col { background: rgba(26,122,74,0.06) !important; }

/* Pagination */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 16px;
}
.page-btn {
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: #fff;
  font-family: var(--font);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--gray-700);
}
.page-btn:hover { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }
.page-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.page-info {
  font-size: 0.85rem;
  color: var(--gray-500);
}

/* ===== GUIDELINES ===== */
.guidelines-box {
  background: #fff;
  border-radius: 14px;
  box-shadow: var(--shadow);
  padding: 30px 36px;
  max-width: 700px;
  margin: 0 auto;
  border: 1px solid var(--border);
}
.guidelines-box h2 {
  font-size: 1.3rem;
  color: var(--green-dark);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--green-light);
}
.guidelines-list { list-style: none; }
.guidelines-list li {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--gray-100);
  font-size: 0.95rem;
  line-height: 1.8;
  color: var(--gray-700);
}
.guidelines-list li:last-child { border-bottom: none; }
.g-icon {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  background: var(--green-light);
  color: var(--green-dark);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  margin-top: 2px;
}

/* ===== ADMIN PANEL ===== */
.admin-sections {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
@media (max-width: 900px) { .admin-sections { grid-template-columns: 1fr; } }
.admin-card {
  background: #fff;
  border-radius: 14px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: hidden;
}
.admin-card-header {
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  padding: 14px 20px;
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
}
.admin-card-body { padding: 20px; }
.admin-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}
.admin-table th {
  background: var(--gray-100);
  padding: 8px 10px;
  text-align: right;
  color: var(--gray-700);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}
.admin-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--gray-100);
  color: var(--gray-900);
}
.admin-table tr:last-child td { border-bottom: none; }
.admin-table tr:hover td { background: var(--gray-50); }
.btn-sm {
  padding: 4px 10px;
  border-radius: 6px;
  font-family: var(--font);
  font-size: 0.8rem;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  margin: 1px;
}
.btn-sm.green { background: var(--green-light); color: var(--green-dark); border-color: var(--green); }
.btn-sm.green:hover { background: var(--green); color: #fff; }
.btn-sm.red { background: var(--red-light); color: var(--red); border-color: var(--red); }
.btn-sm.red:hover { background: var(--red); color: #fff; }
.btn-sm.gold { background: #fef9e7; color: var(--gold); border-color: var(--gold); }
.btn-sm.gold:hover { background: var(--gold); color: #fff; }
.notif-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--font);
  font-size: 0.95rem;
  margin-bottom: 10px;
  direction: rtl;
}
.notif-input:focus { outline: none; border-color: var(--green); }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  width: 90%;
  max-width: 480px;
  padding: 28px;
  position: relative;
  direction: rtl;
}
.modal-close {
  position: absolute;
  left: 16px; top: 16px;
  background: none;
  border: none;
  font-size: 1.4rem;
  cursor: pointer;
  color: var(--gray-500);
  line-height: 1;
}
.modal-close:hover { color: var(--red); }
.modal-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--gray-900);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

/* ===== MISC ===== */
.page-title {
  font-size: 1.3rem;
  color: var(--gray-900);
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.page-title::after {
  content: '';
  flex: 1;
  height: 2px;
  background: var(--green-light);
  border-radius: 1px;
}
.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 14px;
  font-size: 0.82rem;
  color: var(--gray-500);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.legend-dot {
  width: 20px; height: 20px;
  border-radius: 5px;
  font-size: 0.75rem;
  display: flex;
  align-items: center;
  justify-content: center;
}
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--gray-900);
  color: #fff;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 0.9rem;
  z-index: 9999;
  transition: transform 0.3s;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.green { background: var(--green-dark); }
.toast.red { background: var(--red); }

@media (max-width: 768px) {
  header { padding: 12px 14px 10px; }
  .school-name { font-size: 1.2rem; }
  .header-top { grid-template-columns: 1fr auto; }
  .header-left { display: none; }
  .clock-time { font-size: 1.1rem; }
  .page { padding: 16px; }
  nav { padding: 0 10px; }
  .nav-links li a, .nav-links li button { padding: 12px 10px; font-size: 0.85rem; }
}
</style>
</head>
<body>

<!-- Notification Bar -->
<div id="notifBar">
  <span id="notifText"></span>
  <button id="notifClose" onclick="document.getElementById('notifBar').classList.remove('active')">✕</button>
</div>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="header-right" id="clockBox">
      <div class="clock-box">
        <span class="clock-time" id="clockTime">00:00:00</span>
        <span class="clock-ampm" id="clockAmPm">AM</span>
      </div>
    </div>
    <div class="header-center">
      <div class="bismillah">بِسْمِ اللّٰہِ الرَّحْمٰنِ الرَّحِیْم</div>
      <div class="school-name">سبل السلام تعلیمی سینٹر
        <span style="font-size:0.65em;font-weight:400;color:#a5d6b0;">(مسجدِ محتسب، پھاٹک حبش خان دہلی-٦)</span>
      </div>
      <div class="register-title">یومیہ حاضری رجسٹر براۓ اساتذہ</div>
    </div>
    <div class="header-left" id="monthBox">
      <div class="month-box">
        <div class="month-name" id="monthName">—</div>
        <div class="month-year" id="monthYear">—</div>
      </div>
    </div>
  </div>
  <hr class="header-divider">
</header>

<!-- NAV -->
<nav>
  <ul class="nav-links">
    <li><button class="active" onclick="showPage('attendance',this)">📋 حاضری رجسٹر</button></li>
    <li><button onclick="showPage('guidelines',this)">📖 اہم ہدایات</button></li>
    <li><button onclick="showPage('admin-login',this)" id="adminNavBtn">🔐 ایڈمن</button></li>
  </ul>
  <div class="nav-right">
    <div id="userInfo">
      <span class="user-badge" id="userNameBadge"></span>
      <span class="admin-badge" id="adminBadge" style="display:none">ایڈمن</span>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
    <div id="loginNavBtn">
